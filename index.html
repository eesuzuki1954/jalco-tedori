<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHD株式 手取り計算</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            margin: 20px;
            font-size: 18px;
        }
        .container {
            max-width: 400px;
            margin: auto;
        }
        .row {
            margin-bottom: 10px;
        }
        input {
            width: 100%;
            padding: 8px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>JHD株式 手取り計算</h2>

        <div id="price" class="row"></div>
        <div id="diff" class="row"></div>
        <div id="time" class="row"></div>

        <div class="row">
            株数：<span id="shares">218,692</span>株
        </div>

        <div class="row">
            借入残高（D）：<input type="number" id="loan" value="0">
        </div>

        <div class="row">
            手取り：<span id="net">0</span>円
        </div>
    </div>

<script>
const STOCK_API = "/stock";
let latestPrice = null;

async function fetchPrice() {
    try {
        const res = await fetch(STOCK_API);
        if (!res.ok) throw new Error("Flask NG");

        const data = await res.json();
        if (data.error) throw new Error("Flask returned error");

        const price = data.price;
        const prev  = data.prevClose;   // ← ★ここだけ修正済み

        applyDisplayLogic(price, prev);
        return;

    } catch (e) {
        console.log("Flask失敗 → Yahooへ", e);
    }
}

function applyDisplayLogic(price, prevClose) {
    const diff = price - prevClose;
    const time = "15:30:00";  // 固定表示（あなたの画像通り）

    updatePrice(price, diff, time);
    latestPrice = price;
    calculate();
}

function updatePrice(price, diff, time) {
    const priceEl = document.getElementById("price");
    const diffEl  = document.getElementById("diff");
    const timeEl  = document.getElementById("time");

    // ★ あなたの元のレイアウトに完全一致させる
    priceEl.textContent = `株価：${price}円（前日比${diff}円）`;
    diffEl.textContent  = `（更新 ${time}）`;
    timeEl.textContent  = "";  // 3行目は使わない
}

function calculate() {
    const shares = 218692;
    const loan = Number(document.getElementById("loan").value || 0);

    if (latestPrice === null) return;

    const total = latestPrice * shares;
    const net = total - loan;

    document.getElementById("net").textContent = net.toLocaleString();
}

fetchPrice();
setInterval(fetchPrice, 60000);
</script>

</body>
</html>
