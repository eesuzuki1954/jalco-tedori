<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>JALCO 手取り計算</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
    background: #fafafa;
}
.box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
label {
    font-weight: bold;
}
input {
    width: 100%;
    padding: 10px;
    font-size: 20px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
.result {
    font-size: 26px;
    font-weight: bold;
    margin-top: 20px;
}
</style>
</head>

<body>
<div class="box">
    <h2>JALCO 手取り計算</h2>

    <p id="price">株価：取得中…</p>
    <p>株数：218,692 株（固定）</p>

    <label>借入額（円）</label>
    <input id="loan" type="text" value="50,000,000">

    <p class="result" id="tedori">手取り：計算中…</p>
</div>

<script>
// 固定値
const SHARES = 218692;
const COST = 51200088;   // 取得原価
const FEE = 250000;      // 手数料
const TAX_RATE = 0.20315;

// 3桁区切り入力
const loanInput = document.getElementById("loan");
loanInput.addEventListener("input", () => {
    let raw = loanInput.value.replace(/,/g, "");
    raw = raw.replace(/\D/g, "");
    loanInput.value = Number(raw).toLocaleString();
    if (window.latestPrice) calculate(window.latestPrice);
});

// 計算式
function calculate(price) {
    const loan = Number(loanInput.value.replace(/,/g, ""));

    const sellAmount = price * SHARES;
    const profit = sellAmount - COST - FEE;
    const tax = Math.max(profit, 0) * TAX_RATE;

    // 手取り額（小数点以下を四捨五入）
    const tedori = Math.round(sellAmount - FEE - tax - loan);

    document.getElementById("tedori").textContent =
        "手取り：" + tedori.toLocaleString() + " 円";
}

// Yahoo API（CORS回避＋リトライ＋タイムアウト）
async function fetchPrice() {
    const url = "https://api.allorigins.win/raw?url=" +
        encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/6625.T");

    for (let i = 0; i < 3; i++) {
        try {
            const controller = new AbortController();
            setTimeout(() => controller.abort(), 5000); // 5秒タイムアウト

            const res = await fetch(url, { signal: controller.signal });
            const data = await res.json();

            const price = data.chart.result[0].meta.regularMarketPrice;

            window.latestPrice = price;

            document.getElementById("price").textContent =
                "株価：" + price.toLocaleString() + " 円";

            calculate(price);
            return;
        } catch (e) {
            console.log("取得失敗、リトライ:", i + 1);
        }
    }

    document.getElementById("price").textContent = "株価：取得失敗";
}

fetchPrice();
</script>

</body>
</html>
