<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>JALCO 手取り計算</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
    background: #fafafa;
}
.box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
label {
    font-weight: bold;
}
input {
    width: 100%;
    padding: 10px;
    font-size: 25px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
.result {
    font-size: 26px;
    font-weight: bold;
    margin-top: 20px;
}
.item {
    font-size: 22px;
    margin-top: 10px;
}
</style>
</head>

<body>
<div class="box">
    <h2>JALCO 手取り計算</h2>

    <p class="item" id="price">株価：取得中…</p>
    <p class="item">株数：218,692 株</p>
    <p class="item" id="sellAmount">売却代金：-</p>
    <p class="item">取得原価：51,200,088 円</p>
    <p class="item">B 約定手数料：250,000 円</p>
    <p class="item" id="profit">売却益（課税対象）：-</p>
    <p class="item" id="tax">税金（20.315%）：- 円</p>
    <label>D 借入残高（円）</label>
    <input id="loan" type="text" inputmode="numeric" pattern="[0-9]*">

    <p class="result" id="tedori">手取り：計算中…</p>
    <p class="item" id="formula">E = A − B − C − D</p>
</div>

<script>
// 固定値
const SHARES = 218692;
const COST = 51200088;   // 取得原価
const FEE = 250000;      // 手数料
const TAX_RATE = 0.20315;

// ▼ 日付に応じた借入残高の初期値
function getInitialLoan() {
    const today = new Date();
    const y = today.getFullYear();
    const m = today.getMonth() + 1;
    const d = today.getDate();

    const dateNum = y * 10000 + m * 100 + d;

    if (dateNum <= 20260601) return 48400000;
    if (dateNum <= 20270601) return 45800000;
    if (dateNum <= 20280601) return 43200000;
    return 40000000;
}

// 初期値セット
const loanInput = document.getElementById("loan");
loanInput.value = getInitialLoan().toLocaleString();

// 3桁区切り入力
loanInput.addEventListener("input", () => {
    let raw = loanInput.value.replace(/,/g, "");
    raw = raw.replace(/\D/g, "");
    loanInput.value = Number(raw).toLocaleString();
    if (window.latestPrice) calculate(window.latestPrice);
});

// 計算式
function calculate(price) {
    const loan = Number(loanInput.value.replace(/,/g, ""));

    const sellAmount = price * SHARES;
    const profit = sellAmount - COST - FEE;
    const tax = Math.max(profit, 0) * TAX_RATE;
    const tedori = Math.round(sellAmount - FEE - tax - loan);

    document.getElementById("sellAmount").textContent =
        "A 売却代金：" + sellAmount.toLocaleString() + " 円";

    document.getElementById("profit").textContent =
        "売却益（課税対象）：" + profit.toLocaleString() + " 円";

    document.getElementById("tax").textContent =
        "C 税金（20.315%）：" + Math.round(tax).toLocaleString() + " 円";

    document.getElementById("tedori").textContent =
        "手取り：" + tedori.toLocaleString() + " 円";
}

// 株価取得（AllOrigins）
async function fetchPrice() {
    const url = "https://api.allorigins.win/raw?url=https://query1.finance.yahoo.com/v8/finance/chart/6625.T";

    try {
        const res = await fetch(url);
        const data = await res.json();

        const price = data.chart.result[0].meta.regularMarketPrice;

        window.latestPrice = price;

        document.getElementById("price").textContent =
            "株価：" + price.toLocaleString() + " 円";

        calculate(price);
    } catch (e) {
        document.getElementById("price").textContent = "株価：取得失敗";
    }
}

fetchPrice();
</script>

</body>
</html>
